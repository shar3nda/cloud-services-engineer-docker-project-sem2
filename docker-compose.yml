services:
  backend:
    image: ${DOCKER_USER:-johannkrupp}/docker-project-backend:latest
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - backend-net
  frontend:
    image: ${DOCKER_USER:-johannkrupp}/docker-project-frontend:latest
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    volumes:
      - frontend-logs:/app/logs
    tmpfs:
      - /var/cache/nginx:size=128m,noexec,nosuid,mode=1777
      - /var/run:size=128m,noexec,nosuid,mode=1777
      - /tmp:size=128m,noexec,nosuid,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.40'
          memory: 256M
        reservations:
          cpus: '0.20'
          memory: 128M
    networks:
      - frontend-net
  gateway:
    image: nginxinc/nginx-unprivileged:1.31-alpine3.23
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    read_only: true
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - gateway-logs:/var/log/nginx
    tmpfs:
      - /var/cache/nginx:size=128m,noexec,nosuid,mode=1777
      - /var/run:size=128m,noexec,nosuid,mode=1777
      - /tmp:size=128m,noexec,nosuid,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 256M
        reservations:
          cpus: '0.20'
          memory: 128M
    networks:
      - frontend-net
      - backend-net

networks:
  backend-net:
  frontend-net:

volumes:
  gateway-logs:
  frontend-logs:
