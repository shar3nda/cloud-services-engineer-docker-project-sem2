services:
  backend:
    build:
      context: ./backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  frontend:
    build:
      context: ./frontend
      args:
        - VUE_APP_API_URL=/api
        - VUE_APP_PUBLIC_PATH=/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    volumes:
      - frontend-logs:/app/logs
    tmpfs:
      - /var/cache/nginx:size=128m,noexec,nosuid,mode=1777
      - /var/run:size=128m,noexec,nosuid,mode=1777
      - /tmp:size=128m,noexec,nosuid,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
  gateway:
    image: nginxinc/nginx-unprivileged:1.31-alpine3.23
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    read_only: true
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - gateway-logs:/var/log/nginx
    tmpfs:
      - /var/cache/nginx:size=128m,noexec,nosuid,mode=1777
      - /var/run:size=128m,noexec,nosuid,mode=1777
      - /tmp:size=128m,noexec,nosuid,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  gateway-logs:
  frontend-logs:
